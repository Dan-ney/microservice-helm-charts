name: Publish Helm Chart

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Helm
        uses: azure/setup-helm@v4 

      - name: Get Chart Version
        id: chart_version
        run: |
          VERSION=$(grep '^version:' microservice/Chart.yaml | awk '{print $2}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Authenticate Helm to Artifact Registry
        run: |
          gcloud auth print-access-token | helm registry login \
            asia-south1-docker.pkg.dev \
            --username oauth2accesstoken \
            --password-stdin

      - name: Package Chart
        run: helm package microservice/

      - name: Push Chart
        run: |
          helm push microservice-${{ steps.chart_version.outputs.version }}.tgz \
            oci://asia-south1-docker.pkg.dev/project-75c9b927-531d-4e58-a2b/helm-charts
